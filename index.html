<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tic Tac Xoxo</title>
  <meta name="description" content="Play Tic Tac Xoxo in 3x3, 4x4, or 5x5 mode with a friend or against the computer.">
  <link rel="canonical" href="https://xotrix.buildjoynow.com/">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://xotrix.buildjoynow.com/">
  <meta property="og:title" content="Tic Tac Xoxo">
  <meta property="og:description" content="Play Tic Tac Xoxo in 3x3, 4x4, or 5x5 mode with a friend or against the computer.">
  <meta property="og:image" content="https://xotrix.buildjoynow.com/xotrix-og.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Tic Tac Xoxo">
  <meta name="twitter:description" content="Play Tic Tac Xoxo in 3x3, 4x4, or 5x5 mode with a friend or against the computer.">
  <meta name="twitter:image" content="https://xotrix.buildjoynow.com/xotrix-og.svg">
  <link rel="icon" href="xotrix-logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="xotrix-logo.svg">
  <link rel="stylesheet" href="xoxo-v1.css">
</head>
<body>
  <main class="app" aria-labelledby="game-title">
    <div class="app-stack">
      <section class="game-shell">
        <div class="topbar">
          <div>
            <p class="eyebrow">Local game</p>
            <div class="brand-title">
              <span class="title-icon" aria-hidden="true">
                <span>X</span>
                <span>O</span>
              </span>
              <h1 id="game-title">Tic Tac Xoxo</h1>
            </div>
          </div>
          <div class="topbar-actions">
            <button class="icon-button" id="shareButton" type="button" aria-label="Share Tic Tac Xoxo" title="Share Tic Tac Xoxo">
              <svg class="share-icon" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                <circle cx="18" cy="5" r="3"></circle>
                <circle cx="6" cy="12" r="3"></circle>
                <circle cx="18" cy="19" r="3"></circle>
                <path d="M8.6 10.7l6.8-4.4M8.6 13.3l6.8 4.4"></path>
              </svg>
            </button>
            <button class="icon-button" id="resetButton" type="button" aria-label="Reset game" title="Reset game">
              <span aria-hidden="true">&#8635;</span>
            </button>
          </div>
        </div>

        <div class="mode-control" aria-label="Game mode">
          <button class="mode-button active" id="twoPlayerButton" type="button">2 players</button>
          <button class="mode-button" id="computerButton" type="button">Vs computer</button>
        </div>

        <div class="size-control" aria-label="Board size">
          <button class="size-button active" type="button" data-size="3">3x3</button>
          <button class="size-button" type="button" data-size="4">4x4</button>
          <button class="size-button" type="button" data-size="5">5x5</button>
        </div>

        <div class="scoreboard" aria-label="Scoreboard">
          <div class="score active" id="scoreX">
            <span class="score-label">X</span>
            <strong id="winsX">0</strong>
          </div>
          <div class="score">
            <span class="score-label">Draw</span>
            <strong id="draws">0</strong>
          </div>
          <div class="score" id="scoreO">
            <span class="score-label">O</span>
            <strong id="winsO">0</strong>
          </div>
        </div>

        <p class="status" id="status" aria-live="polite">X to move</p>

        <div class="board" id="board" role="grid" aria-label="Tic Tac Xoxo board"></div>

        <div class="actions">
          <button class="primary" id="newRoundButton" type="button">New round</button>
          <button class="secondary" id="clearScoresButton" type="button">Clear scores</button>
        </div>
      </section>

      <footer class="app-footer">
        <img
          class="visitor-badge"
          src="https://hits.sh/xotrix.buildjoynow.com.svg?label=Visitors&color=1b998b&labelColor=202124"
          width="70"
          height="20"
          alt="Visitor count"
          loading="eager"
          referrerpolicy="no-referrer"
        >
        <span class="version">v1.0</span>
        <span class="copyright">Copyright 2026 buildjoynow.com. All rights reserved.</span>
      </footer>
    </div>
  </main>

  <script src="xoxo-v1.js"></script>
</body>
</html>
